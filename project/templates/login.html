{% extends "base.html" %}
{% block title %}Login — RetailAI{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div style="width:52px;height:52px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.3rem;"><i class="fas fa-brain"></i></div>
      <div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;">Retail<span style="color:var(--cyan)">AI</span></div>
    </div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Login to your RetailAI dashboard</p>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="password" name="password" class="form-control" placeholder="Your password" required>
          <span class="input-icon-right toggle-password"><i class="fas fa-eye"></i></span>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>

    <div class="divider">or</div>
    <div class="text-center text-sm text-muted">Don't have an account? <a href="/signup" class="text-primary fw-bold">Sign Up Free</a></div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
  const fd = new FormData(e.target);
  try {
    const res = await fetch('/login', { method:'POST', body: fd });
    const data = await res.json();
    if (data.success) {
      showToast(data.message, 'success');
      setTimeout(() => window.location.href = data.redirect, 1000);
    } else {
      showToast(data.message, 'error');
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }
  } catch {
    showToast('Something went wrong!', 'error');
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
  }
});
</script>
{% endblock %}
